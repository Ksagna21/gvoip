<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GVoIP — Dashboard</title>
    <meta name="description" content="Plateforme de supervision VoIP multi-tenant" />
    <meta name="author" content="GVoIP" />
    <meta name="author" content="SKJ Server Team" />

    <!-- ── Persistance du thème — DOIT être en premier ──────────
         Applique le bon thème AVANT que React charge,
         évite tout flash de couleur au refresh.
    ──────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        if (stored === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (stored === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          // Aucune préférence sauvegardée → utiliser la préférence système
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
